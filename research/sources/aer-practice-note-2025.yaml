Explanation of the AER
The following provides a simple explanation of the AER which is intended for distribution to
staff and/or customers.

AER вҖ“ an explanation

The Annual Equivalent Rate is a notional rate quoted in advertisements for interest-bearing
accounts which illustrates the Gross Interest Rate (excluding any bonus interest payable) as
if paid and compounded on an annual basis.


Advertisements may also quote an AER including conditional bonuses clearly identified as
such.

   вҖў   If an account pays or credits interest once a year, then the AER is equal to the gross
       rate.

   вҖў   If an account pays interest more often than once a year, then the AER is calculated
       by adding each interest payment to the deposit and calculating the next interest
       payment on the total вҖ“ compounding the interest.

For example, an account offering 5% gross interest paid quarterly on ВЈ100 pays:

   вҖў   ВЈ1.25 (1.25% (Вј of 5%) of ВЈ100) after 3 months,
   вҖў   ВЈ1.26 (1.25% of ВЈ101.25 (ВЈ100 + ВЈ1.25)) after six months*,
   вҖў   ВЈ1.28 (1.25% of ВЈ102.51) after nine months, and
   вҖў   ВЈ1.30 at the end of the year (1.25% of ВЈ103.79),

giving a total including interest of ВЈ105.09.

The AER is thus 5.09%

*In practice, the calculation is worked to more decimal places to avoid rounding errors.

   вҖў   If an account pays interest at intervals greater than 1 year, we are looking for a rate
       which will give us the right answer if applied and compounded each year.

For example, an account which pays 5% for five years but pays it only at the end of the five
years will pay back ВЈ125 after the five years on ВЈ100 deposited (the original ВЈ100 plus ВЈ25
interest).

The AER is 4.56% and we can see how this works as follows:

   вҖў   ВЈ4.56 (4.56% of ВЈ100) would be the interest at the end of year 1,
   вҖў   ВЈ4.77 (4.56% of ВЈ104.56) at the end of year 2,


                                                18
    вҖў   ВЈ4.99 (4.56% of ВЈ109.33) at the end of year 3,
    вҖў   ВЈ5.21 (4.56% of ВЈ114.32) at the end of year 4, and
    вҖў   ВЈ5.45 (4.56% of ВЈ119.53) at the end of year 5,

giving a final total of ВЈ124.98.

Not exactly ВЈ125 but as close as we can get to 2 decimal places (try the calculation with
4.57% instead вҖ“ you will get ВЈ125.05).

    вҖў   The AER for more complicated patterns of changing deposits and/or interest rates
        can really be solved only by trial and error вҖ“ a process best left to computers!

The AER is a notional rate вҖ“ it is not necessarily equal to the cash return because, in
calculating it, we make assumptions:

    вҖў   The only changes to the amount deposited that are taken into account are those that
        are required by the terms of the account. So, for example, on an account from which
        you can make withdrawals, the assumption is that you make just an initial deposit
        and leave it there. On the other hand, on a monthly savings account, it is assumed
        that you will make the deposits each month. If certain deposits are required to qualify
        for a conditional bonus, then the AER including conditional bonuses will be calculated
        assuming that you have made the necessary deposits.

    вҖў   The only changes to rates that are taken into account are those that are stated at the
        outset. No allowance is made for change that may occur because market rates
        generally move up or down. So, for example, if an account has a rate which will
        increase the longer a deposit is held, the higher rate will be used after the requisite
        time. Where an initial higher rate is guaranteed for a number of months, the rate after
        that will be assumed to reduce to the вҖңnormalвҖқ rate applicable at the time of the
        advertisement. If a monthly savings account has a tiered interest rate, then the
        appropriate rate will be used as the balance builds up.

    вҖў   If an account has a fixed or minimum term, the assumption will be made that you
        leave your deposit there for that period. If the term is indefinite, the calculation is
        done on the first year, or until the first interest payment if that is after one year. If a
        conditional bonus requires that you leave the deposit in the account for a certain
        time, then the AER including conditional bonuses will be calculated over that period.

    вҖў   All interest paid is treated as if it is invested and earns a rate of interest equal to that
        being earned on your deposit. This may, in fact, happen if the interest is added to
        principal. However, even on an account making monthly interest payments, this
        assumption is made to illustrate the value to you of receiving these payments during
        the year. If a deposit has a very short term (for example, a six-month bond), for AER
        purposes, it is assumed that you can invest the principal and interest at the end of
        the period at the same rate for the rest of the year.
