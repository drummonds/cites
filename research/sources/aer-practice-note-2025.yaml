Annual Equivalent Rate (AER) Practice Note
January 2025



Guidance for banks and building societies
UK Finance, 1 Angel Court, London EC2R 7HJ
The Building Societies Association, York House, 23 Kingsway, London WC2B 6UJ



Introduction
This вҖңAnnual Equivalent Rate (AER) Practice Note вҖқ (Practice Note), draws together key
points from, and replaces the вҖңCode of Conduct for the Advertising of Interest Bearing
AccountsвҖқ (the Code) and the вҖңCalculation of the Annual Equivalent Rate (AER) appendix to
the CodeвҖқ, which were in place between 1985 and 2024. It is published jointly by UK Finance
and the Building Societies Association (BSA).

This Practice Note is for guidance only. Banks and building societies are free to reach their
own conclusions on interpretation and, for that reason, this document is intended primarily
for the use of banks and building societies and their professional advisers. However, a copy
of this Practice Note has been sent to the Financial Conduct Authority, which is responsible
for monitoring compliance with the Payment Services Regulations 2017 (PSR) and its
Handbook, in particular the Banking Conduct of Business Sourcebook (BCOBS).



General
1. The terms of this Practice Note apply to the advertising of all interest bearing accounts
maintained within the United Kingdom by banks and building societies.

'Interest bearing accounts' includes current accounts which pay interest on credit balances.



Statement of Interest Rates
2. Where interest rates are advertised, these must be described as follows:

   a. X% gross

   b. Y% tax free, and

   c. Z% Annual Equivalent Rate ("AER")


                                               1
where:

   a. is the Gross Interest Rate payable before the deduction of income tax at the rate
      specified by law (the "specified rate"); an explanatory phrase conveying this meaning
      must be used in conjunction with this expression.

   b. is the tax free Rate of interest payable where interest is exempt from income tax. An
      explanatory phrase conveying this meaning must be used in conjunction with this
      expression.

   c. is a notional rate which illustrates the Gross Interest Rate (excluding any conditional
      bonus payable) as if paid and compounded on an annual basis. An explanatory
      phrase conveying this meaning must be used in conjunction with this expression. Any
      assumptions made in calculating the rate should be stated. e.g. if interest is not paid
      into the account and compounded then the AER will not be achieved.

In the case of a table or list of rates, the words "gross", "tax free" and "AER" as appropriate
need not appear after each rate. However, it must be clear which term applies to which rate,
for example, by the use of column headings or footnotes.

The above paragraph puts beyond doubt the fact that any advertisement listing a series of
rates, for example, when comparing competitors' products, need only ensure that the
appropriate term is clear. This applies the provisions of general notifications of rates (see
Section 7) to advertisements.

The AER should be quoted, in respect of the Gross Interest Rate only, in every
advertisement where an interest rate is quoted.

This means that all advertisements include one rate which is capable of comparison across
all advertisements, regardless of product provider and how interest is calculated and paid.
The AER is a truly reflective rate, taking into account the frequency with which the product
has interest paid or compounded. So, for example, if two products pay the same Gross
Interest Rate of interest but one pays or compounds interest more frequently than the other,
the account which pays or compounds interest more frequently will have a higher AER.

It is suggested that wording along the following lines should be used (for example, in leaflets,
supporting wording of advertisements etc.) to explain the AER:

"AER stands for Annual Equivalent Rate and illustrates what the interest rate would be if
interest was paid and compounded once each year. [As every advertisement for a savings
product which quotes an interest rate will contain an AER, you will be able to compare more
easily what return you can expect from your savings over time.]"

(The first sentence could be used alone to cut down length).

The explanation of the AER, вҖңgrossвҖқ, or вҖқtax freeвҖқ need not be included in television; radio;
telephone; SMS; mobile application; social media; paid search or banner advertisements.

Advertisements which do not quote a specific rate of interest, for example, which simply
state that the rate will be x% below base rate, do not need to quote an AER.



                                               2
AER Prominence
3. Advertisements which quote a rate of interest must quote the AER and either the Gross
Interest Rate or the tax free Rate depending on the product. e.g. the AER and the tax free
Rate should be used for Cash ISAs. No rate or return shall be given greater prominence
than the AER. For illustrative purposes, advertisements may also include an AER including
conditional bonuses. However, this rate must be given the same prominence as the Gross
Interest Rate and the AER and must be described as "AER including conditional bonuses".
Where Gross Interest Rates are quoted on the basis of other than a 12 month period, this
must be clearly stated. Where an interest rate is calculated on a basis other than actual/365,
the basis should be stated and the AER should nonetheless be calculated on an actual/365
basis.

вҖңActual/365вҖқ means that interest is calculated by taking the balance multiplied by the annual
interest rate divided by 100, multiplied by the number of calendar days that the balance is
held, divided by 365 in a normal year or by 365 or 366 days in a leap year. If making an
adjustment for AER purposes, the divisor should be 365 in all years.

Because the AER will be the one rate that customers will be able to use to compare all
products, it must be given equal prominence as the Gross Interest Rate (i.e. the gross or tax
free rate). However, if the AER is exactly the same as the Gross Interest Rate, there is no
need to quote the same rate twice - it is enough to state, for example, "5% gross/AER".

An AER including conditional bonuses (paid, for example, if the customer makes only a
certain number of withdrawals each year) can only be included if the AER is also quoted and
given the same prominence.

4. Advertisements which quote a rate of interest must contain the following specific
information:

   a. the frequency of payment of interest.
   b. either -
        вҖў a statement that the Gross Interest Rate is fixed for any specified term; or
        вҖў a statement that the interest rate is subject to variation.
   c. the minimum amount which must be deposited and/or the number of withdrawals
      which must not be exceeded to achieve the advertised rate of interest.

This provides that, if a rate of interest is quoted in an advertisement, the advertisement must
also state how often interest will be paid (for example, monthly, annually or after five years);
whether the interest is fixed or variable (if fixed, the term must be stated); and any minimum
deposit necessary. The information in 4a and 4b is not required to be contained in any
particular part of the advertisement. However, institutions should take care to ensure, in
respect of printed advertisements, that any footnotes are clear and legible. The information
required under 4c must be prominent and displayed in the main part of the advertisement.




                                               3
Withdrawals
5. Advertisements which quote a rate of interest must clearly explain in the main part of the
advertisement:

   a. Any key restrictions on the number and/or amount of withdrawals that can be made;
   b. Any requirement to give notice or satisfy any other key condition before a withdrawal
      is made;

Additionally, any charges or lower interest rates must be clearly stated with appropriate
prominence, ensuring all advertisements/content are clear, fair and not misleading. This will
enable the customer to make an informed choice regarding the suitability of the product for
their circumstances.

5a and 5b refer to limitations relating to the product itself and not to any limitation imposed
generally on cash withdrawals or conditions which must be satisfied for security or practical
reasons.

The disclosure requirement relating to any charges or lower interest rates does not extend to
early termination charges.

For clarity, this section is only relevant to a product which may remain open after a
withdrawal has been made. It does not apply to products where full closure is a requirement
if a customer wishes to withdraw their funds.



Bonuses
6. Advertisements which quote a rate of interest must clearly explain the following in the
main part of the advertisement:

   a. Accounts which advertise a bonus rate of interest, payable for a specific period, must
      ensure that the % amount/fixed amount and duration of the bonus is clearly stated.
   b. The terms which apply to the payment of any other bonus must be clearly stated.
      including the % amount/fixed amount of the bonus.
   c. Where a bonus rate or amount is stated, it should be clear whether it is fixed or
      variable.

This provision ensures that bonuses are explained clearly and that key information must be
stated in the main part of the advertisement and not in the footnotes.

If a bonus rate is payable until a fixed date of less than 12 months from the first day funds
can be deposited into the product (for example, "payable until 1 December" and the product
is launched on 1 May), the AER will change over the period. The AER at the time of the
product launch will be higher than that towards the end of the bonus period. This gives rise
to scope for the AER to be misleading if it is not recalculated on a regular basis. It is not,
therefore, enough for advertisements simply to state in the supporting wording the date of

                                               4
calculation of the AER. Instead, AERs on such accounts should be recalculated on a monthly
basis. This means that posters and leaflets, as well as newspaper advertisements etc, need
to be changed monthly, if such accounts are being advertised.

To re-emphasise, an AER including conditional bonuses can only be included if the AER is
also quoted and given the same prominence.



Notices of Rates
7. A general notice to customers of rates need only comply with Sections 2 and 3 above In
the case of such notices or lists, the words "gross", "tax free" and "AER" as appropriate need
not appear after each rate. However, it must be clear from the whole of the notice or list
which term applies to which rate, for example, by the use of column headings or footnotes.

This means that general notices of rates, for example, which generally are not inherently
designed to sell products but to inform customers of rates, need comply only with Sections 2
and 3 above. However, it may also be necessary to give some, or all of the information set
out in Sections 4 and 6 above in order to identify the amount(s) and/or interest frequencies
to which the specified rates apply.



"Instant Access"
8.
     a. An account may not be described as having instant access or "immediate
        withdrawal" or any similar statement where withdrawal must be other than by cash.
     b. Any conditions attached to 'instant' or 'immediate' (or any other similar statement)
        withdrawal must be made clear, for example if:
         вҖў the number of withdrawals that may be made without transactional charges, loss
            of interest, loss of bonus or any similar charge being made, is limited.
         вҖў the amount of cash that can be withdrawn in a transaction is limited by the
            account should be clearly stated in the main part of the advertisement.

These provisions relate to an historic Advertising Standards Authority decision regarding the
use of the words "instant access". "Instant access" and any similar wording should be used
only where it is possible to make cash withdrawals (without charge), whether in a branch or
via an ATM. Accounts which do not offer this facility should not be described as "instant
access". Accounts which themselves do not have the facility to withdraw cash, but which
allow immediate real-time transfers to a side account from which cash may be withdrawn are
also acceptable. UK Finance and the BSA have both recommended that, to avoid confusion,
accounts should not have "instant access" in their titles if they do not actually offer instant
access.

However, it is possible to describe an account as having "instant access", where the number
of withdrawals that may be made is limited for good reason. For example, it would be within
the spirit of Section 8b to limit the number of withdrawals on a savings account to ensure

                                               5
that it was not used as a money transmission account, but it would not be appropriate to limit
withdrawals too tightly. Any restrictions and charges (howsoever calculated and described)
must be stated in the main part of the advertisement and not in the supporting text.

If the terms of the product limit the amount of cash that can be withdrawn in a single
transaction, that must be clearly stated in the main part of the advert, together with the
amount of the limit. Again, as with Section 8a, this refers to a particular limitation on the
product itself, and not to a general floor limit imposed by the institution across the board, for
example, for security or other practical reasons.



