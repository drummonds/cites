AER Guideline A4

Short-term deposit with higher than normal interest rate.

Guideline A4 explains that all interest paid is treated as if it is invested and earns a rate of
interest equal to that being earned on the deposit. It goes on to say, вҖңIf the deposit has a
very short term (for example, a six month bond), for AER purposes it is assumed, again for


                                                15
illustrative and comparative purposes, that the principal and interest can be invested at the
end of the period at the same rate for the rest of the year.вҖқ

Assume a deposit has a gross rate of 6% payable at maturity in 6 monthsвҖҷ time.

A blended AER of 6.09% should be used by assuming reinvestment at the existing rate
gross rate for the following 6 month period.

AER calculation is: (((1+ 6/2*100))^2)-1)*100)

Providers should not underquote in this scenario by rounding down to 6% but should
consistently apply the guidelines which assumes reinvestment at the original gross rate for a
following 6 month period.



