Notes
The general formula set out at a) is complicated because it attempts to cater for any sort of
deposit. The following notes aim to clarify its assumptions and application:

     вҖў   It envisages a depositor making a series of payments (some of which may be zero)
         into the account at annual intervals and the product provider paying or crediting
         interest annually which may be at a different rate (possibly zero) each year.
     вҖў   Deposits are assumed to be made at the beginning of a year and interest paid at the
         end of the year.
     вҖў   If deposits or interest payments are not made on anniversaries of the start date, the
         formula can be operated using shorter periods and fractions of the annual rate(s),
         and the answer compounded up to an annual rate using the formula at d).
     вҖў   The interest payable in each year is the amount actually payable or to be added to
         principal, not an accrual, so that, if paying 7% a year (simple) after 2 years, the
         interest is 0% in year 1 and 14% in year 2.
     вҖў   The formula treats all interest as compounded because interest paid (say) annually is
         worth more to the depositor than interest paid only after two years. Interest paid is
         compounded at the Gross Interest Rate to avoid the introduction of an arbitrary
         reinvestment rate.




                                                7
Guidelines relating to AER calculations
In order to ensure consistency of calculation and fair comparison of products, the AER
should be derived on the following basis:

A1     The only changes to the amount deposited to be taken into account are those
       that are required by the terms of the account. So, for example, on an account
       from which withdrawals may be made, the AER calculation is based on an initial
       deposit with no subsequent movements. On the other hand, on a monthly savings
       account, each monthly deposit is taken into the calculation. If certain deposits are
       required to qualify for a conditional bonus, then the AER including conditional
       bonuses must be calculated assuming that the necessary deposits have been made.
       See Section 3 above on вҖҳAER ProminenceвҖҷ.

A2     The only changes to rates that are taken into account are those that are stated
       at the outset. No allowance is made for change that may occur because market
       rates generally move up or down. So, for example, if an account has a rate which will
       increase the longer a deposit is held, the higher rate will be used after the requisite
       time. Where an initial higher rate is guaranteed for a number of months (an
       вҖңunconditional bonusвҖқ), the rate after that period will reduce to the вҖңnormalвҖқ rate
       applicable at the time of the advertisement. If a monthly savings account has a tiered
       interest rate, then the appropriate rate will be used as the balance builds up. Where a
       deposit will automatically default into another product on maturity within the next 12
       months and the customer is unable to exit the default product itself (or only exit by
       incurring a fee/charge) until maturity then the expected rate for the default product at
       the time of the advertisement should be reflected in the вҖҳblendedвҖҷ AER calculation.

A3     If an account has a fixed or minimum term, the calculation is to be made for
       that period. If the term is indefinite, the calculation is to be done on the first year, or
       until the first interest payment if that is after one year. If a conditional bonus requires
       that you leave the deposit in the account for a certain time, then the AER including
       conditional bonuses will be calculated over that period. See Section 3 above on вҖҳAER
       ProminenceвҖҷ. Where accounts default into another product on maturity with no option
       to exit prior to maturity of the default product (or only exit by incurring a fee/charge)
       the calculation should use the maturity date of the default product as the fixed term
       reference point.

A4     All interest paid is treated as if it is invested and earns a rate of interest equal
       to that being earned on the deposit. This may, in fact, happen if the interest is
       added to principal. However, even on an account making monthly interest payments,
       this assumption is made to illustrate the value of receiving these payments during the
       year. If a deposit has a very short term (for example, a six-month bond), for AER
       purposes it is assumed, again for illustrative and comparative purposes, that the
       principal and interest can be invested at the end of the period at the same rate for the
       rest of the year. Consequently, providers should not вҖҳunderquoteвҖҷ the AER for
       deposits of less than one year to maturity by assuming a reinvestment rate other than


                                                8
         the gross rate of the original investment, unless a leap year applies. The text of the
         advertisement should make this clear when describing the basis on which AER is
         calculated for short-term deposits.

A5       AERs are to be rounded and displayed up to two decimal places.

A6       Where the AER varies according to the date of the deposit (for example, where
         an unconditional bonus is offered until a fixed calendar date or a different
         gross rate applies for deposits received on application pending investment
         into the product):
     вҖў   All advertising should include a statement that the AER assumes that investment was
         made on a specified date.
     вҖў   The date specified should be:
             o relevant to the date the advertisement or literature will appear or be available
                 and not more than 1 month away from that date.
             o for deposits where a different gross rate applies for money received on
                 application pending investment into the product вҖ“ the specified date should be
                 that which the provider first expects to receive funds from customers.
     вҖў   Advertisements showing a recalculated AER will need to be amended on a monthly
         basis, unless the recalculated AER would be higher than the originally advertised
         rate. (This allows providers some operational flexibility regarding the updating of
         advertisements where a short-term period of underquoting AER can be justified given
         the operational benefits).

A7       Where regular monthly savings products are advertised which have a limited
         life of one year and interest is only credited once a year the AER should not
         take account of any interest earned after the account matures. The AER is
         deemed to be the same as the nominal rate for the account.



