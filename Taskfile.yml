version: '3'

tasks:
  fmt:
    desc: Format Go source
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Run fmt, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  build:
    desc: Build the cites CLI
    cmds:
      - go build -o bin/cites ./cmd/cites

  docs:build:
    desc: Render index and all captured sources to HTML
    cmds:
      - mkdir -p docs
      - task-plus md2html --file index.md --dst docs
      - |
        for f in research/sources/*.txt; do
          [ -f "$f" ] && go run ./cmd/cites render "$f" "docs/$(basename ${f%.txt}.html)"
        done

  deps:tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ docs/*.html
