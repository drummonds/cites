version: '3'

tasks:
  fmt:
    desc: Format Go source
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Run fmt, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  build:
    desc: Build the cites CLI
    cmds:
      - go build -o bin/cites ./cmd/cites

  docs:build:
    desc: Render index, refs, and research articles to HTML
    cmds:
      - mkdir -p docs
      - |
        VERSION=$(grep -oP '## \[\K[0-9][^\]]+' CHANGELOG.md | head -1)
        cp index.md /tmp/cites-index.md
        sed -i "s/__VERSION__/$VERSION/" /tmp/cites-index.md
        task-plus md2html --file /tmp/cites-index.md --dst docs
        mv docs/cites-index.html docs/index.html
        rm -f /tmp/cites-index.md
      - |
        REFS_MAP="research/refs.map"
        touch "$REFS_MAP"
        for f in research/sources/*.yaml; do
          [ -f "$f" ] || continue
          BASE=$(basename "$f")
          REF=$(awk -v b="$BASE" '$2==b {print $1}' "$REFS_MAP")
          if [ -z "$REF" ]; then
            LAST=$(awk '{print $1}' "$REFS_MAP" | sort -t'r' -k2 -n | tail -1)
            if [ -z "$LAST" ]; then
              REF="r0"
            else
              NUM=${LAST#r}
              REF="r$((NUM + 1))"
            fi
            echo "$REF $BASE" >> "$REFS_MAP"
          fi
          go run ./cmd/cites render --base .. "$f" "docs/$REF"
        done
      - |
        mkdir -p docs/research
        for f in research/*.md; do
          [ -f "$f" ] || continue
          task-plus md2html --file "$f" --dst docs/research
        done
        # Inject breadcrumb topbar into research articles.
        TOPBAR_CSS='<style>.topbar{background:#0366d6;color:#fff;padding:.5rem 1.5rem;margin-bottom:1.5rem;border-radius:6px;font-size:.85rem;display:flex;align-items:center;gap:.5rem}.topbar a{color:#fff;text-decoration:none;font-weight:600}.topbar a:hover{text-decoration:underline}.topbar .sep{opacity:.6}@media(prefers-color-scheme:dark){.topbar{background:#1f6feb}}</style>'
        for f in docs/research/*.html; do
          [ -f "$f" ] || continue
          TITLE=$(basename "$f" .html)
          CRUMB="<nav class=\"topbar\"><a href=\"../index.html\">cites</a> <span class=\"sep\">›</span> <a href=\".\">research</a> <span class=\"sep\">›</span> ${TITLE}</nav>"
          sed -i "s|<body>|<body>\n${TOPBAR_CSS}\n${CRUMB}|" "$f"
        done
      - |
        for f in research/*.d2; do
          [ -f "$f" ] || continue
          BASE=$(basename "$f" .d2)
          d2 "$f" "docs/research/$BASE.svg" 2>/dev/null || true
        done

  deps:tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ docs/
